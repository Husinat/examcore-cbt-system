<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamCore - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
     <link rel="shortcut icon" href="./../Assets/images/ExamCore imageLogo.png" type="image/x-icon">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['DM Serif Display', 'Georgia', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef6ff',
                            100: '#d9ebff',
                            200: '#bcddff',
                            300: '#8ec8ff',
                            400: '#5aaeff',
                            500: '#2e8ff7',
                            600: '#1a71e8',
                            700: '#1558ca',
                            800: '#1747a4',
                            900: '#193f82',
                            950: '#12274f',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'DM Serif Display', serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50/30 to-slate-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 text-slate-800 dark:text-slate-100 min-h-screen relative overflow-x-hidden transition-colors duration-300">

    <!-- Animated Background Orbs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="orb-1 absolute -top-20 -right-20 w-96 h-96 bg-brand-400/20 dark:bg-brand-600/10 rounded-full blur-3xl"></div>
        <div class="orb-2 absolute -bottom-32 -left-32 w-[28rem] h-[28rem] bg-brand-300/15 dark:bg-brand-500/8 rounded-full blur-3xl"></div>
    </div>

    <!-- Navbar -->
         <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 py-2">
         <div class="max-w-[1400px] mx-auto px-10 sm:px-6 h-16 flex items-center justify-between">
            <!-- Logo -->
          <a href="./../index.html"><div class="flex items-center gap-2">
                <img class=" w-[200px]" src="./../Assets/images/ExamCore Logo.png" alt="ExamCore">
            </div></a>


            <!-- Theme Toggle -->
            <button id="theme-toggle" aria-label="Toggle dark mode"
                class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:border-brand-400 dark:hover:border-brand-500 hover:text-brand-600 dark:hover:text-brand-400 transition-all shadow-sm hover:shadow-md">
                <svg id="icon-sun" class="hidden w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <svg id="icon-moon" class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-center px-4 sm:px-6 py-8 sm:py-12 md:py-16 min-h-[calc(100vh-80px)]">
        
        <!-- Sign In Card -->
        <div class="w-full max-w-md">
            <div class="bg-white dark:bg-slate-900 shadow-2xl dark:shadow-black/40 rounded-3xl p-6 sm:p-8 md:p-10 border border-slate-200 dark:border-slate-700">
                
                <!-- Header -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-brand-500 to-brand-600 rounded-2xl shadow-lg shadow-brand-900/25 mb-5">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl sm:text-3xl md:text-4xl font-serif text-slate-900 dark:text-white mb-2">Welcome Back</h2>
                    <p class="text-sm sm:text-base text-slate-500 dark:text-slate-400">Sign in to continue your practice</p>
                </div>

                <!-- Sign In Form -->
                <form class="space-y-5">
                    
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm sm:text-base font-medium mb-2 text-slate-700 dark:text-slate-300">
                            Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="useremail"
                            placeholder="you@example.com"
                            class="w-full px-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:outline-none transition-all"
                            required>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm sm:text-base font-medium mb-2 text-slate-700 dark:text-slate-300">
                            Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="userpassword"
                                placeholder="••••••••"
                                class="w-full px-4 py-2.5 sm:py-3 pr-12 text-sm sm:text-base rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:outline-none transition-all"
                                required>
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500">
                                <i class="fa-solid fa-eye-slash text-lg sm:text-xl" id="showPassword"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Role Selection -->
                        <label for="password" class="block text-sm sm:text-base font-medium mb-2 text-slate-700 dark:text-slate-300">
                            Role
                        </label>

                    <select id="role" class="w-full px-4 py-2.5 sm:py-3 pr-12 text-sm sm:text-base rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:outline-none transition-all">
              <option value="student">Select Role</option>
              <option value="student">Student</option>
             <option value="admin">Admin</option>
               </select>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input 
                                type="checkbox" 
                                id="remember-me"
                                class="w-4 h-4 rounded border-slate-300 dark:border-slate-600 text-brand-600 focus:ring-2 focus:ring-brand-500 focus:ring-offset-0 transition-all cursor-pointer">
                            <span class="text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Remember me</span>
                        </label>
                        <a href="./forgot-password.html" class="text-brand-600 dark:text-brand-400 hover:text-brand-700 dark:hover:text-brand-300 font-medium hover:underline transition-colors">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="submit"
                        class="w-full bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 active:from-brand-800 active:to-brand-900 text-white font-semibold px-6 py-3 sm:py-3.5 text-sm sm:text-base rounded-xl transition-all shadow-lg shadow-brand-900/25 hover:shadow-xl hover:shadow-brand-900/35 hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <span>Log in</span>
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>

                </form>

                <!-- Divider -->
                <div class="relative my-6 sm:my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-xs sm:text-sm">
                        <span class="px-4 bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400">OR</span>
                    </div>
                </div>

                <!-- Sign Up Link -->
                <div class="text-center">
                    <p class="text-sm sm:text-base text-slate-600 dark:text-slate-400">
                        Don't have an account?
                        <a href="./signup.html" class="text-brand-600 dark:text-brand-400 hover:text-brand-700 dark:hover:text-brand-300 font-semibold hover:underline transition-colors ml-1">
                           Sign up
                        </a>
                    </p>
                </div>

            </div>

            <!-- Additional Info -->
            <p class="text-center text-xs sm:text-sm text-slate-500 dark:text-slate-400 mt-6 px-4">
                Secure login powered by Firebase Authentication
            </p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full py-6 text-center">
        <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-600">
            &copy; 2026 ExamCore. All rights reserved. | Not affiliated with any official examination body.
        </p>
    </footer>

    <!-- Link to your JavaScript file -->
    <script type="module" src="./../Javascript(Functionality)/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
